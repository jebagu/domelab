name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build site
        env:
          GITHUB_ACTIONS: "true"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Cancel stale GitHub Pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -eu

          gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=10" \
            --jq '.[] | select(.sha != env.CURRENT_SHA) | .sha' |
          while IFS= read -r sha; do
            [ -n "$sha" ] || continue
            status="$(gh api "repos/${GITHUB_REPOSITORY}/pages/deployments/${sha}" --jq '.status' 2>/dev/null || true)"
            if [ "$status" = "updating_pages" ]; then
              gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/deployments/${sha}/cancel"
            fi
          done

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
